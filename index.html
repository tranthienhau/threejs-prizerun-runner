<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2b2b33" />
    <title>PrizeRun Runner - deterministic speedrun POC</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/ui/style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="topbar">
        <div class="pill" id="mode">PRACTICE</div>
        <div class="pill timer" id="timer">0.000s</div>
        <div class="pill" id="best">BEST -</div>
        <div class="pill" id="progress">0 / 50</div>
      </div>

      <div class="leaderboard" id="leaderboard">
        <div class="lb-title">Fastest verified times</div>
        <ol id="lb-list"></ol>
        <div class="meta" id="course-meta"></div>
      </div>
    </div>

    <div id="controls">
      <div class="namewrap">
        <input id="name" maxlength="12" placeholder="Your name" value="Runner" />
      </div>
      <div class="actions">
        <button class="cta" id="btn-practice">Practice (free)</button>
        <button class="cta primary" id="btn-official">Start official run</button>
      </div>
      <div class="dpad">
        <button id="btn-up">▲</button>
        <div class="dpad-mid">
          <button id="btn-left">◀</button>
          <button id="btn-down">▼</button>
          <button id="btn-right">▶</button>
        </div>
      </div>
    </div>

    <div id="banner" class="hidden">
      <div class="banner-card">
        <div id="banner-title">Finish</div>
        <div id="banner-body"></div>
        <button class="cta primary" id="banner-close">OK</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
